services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: jk-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    ports:
      - "1433:1433"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P "${MSSQL_SA_PASSWORD}" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 20

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      mssql:
        condition: service_healthy
    volumes:
      - ./database/init.sql:/init.sql
    command: >
      /bin/bash -c "
      /opt/mssql-tools18/bin/sqlcmd -C -S mssql -U sa -P '${MSSQL_SA_PASSWORD}' -i /init.sql
      "
    restart: "no"

  backend:
    build:
      context: ./backend
    container_name: jk-backend
    environment:
      ConnectionStrings__DefaultConnection: "${DB_CONNECTION_STRING}"
    depends_on:
      db-init:
        condition: service_completed_successfully
      mssql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: jk-frontend
    depends_on:
      - backend

  gateway:
    build:
      context: ./gateway
    container_name: jk-gateway
    ports:
      - "8082:80"
    depends_on:
      - frontend
      - backend
