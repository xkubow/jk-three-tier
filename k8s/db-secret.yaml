apiVersion: v1
kind: Secret
metadata:
  name: jk-db-secret
  namespace: jk-three-tier
type: Opaque
stringData:
  POSTGRES_PASSWORD: "<Secret_password>"

  CONFIGURATION_DB_CONNECTION_STRING: "Host=postgres;Port=5432;Database=jk_configuration;Username=postgres;Password=<Secret_password>;"
  ORDER_DB_CONNECTION_STRING: "Host=postgres;Port=5432;Database=jk_order;Username=postgres;Password=<Secret_password>;"

