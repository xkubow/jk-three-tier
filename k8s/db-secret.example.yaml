apiVersion: v1
kind: Secret
metadata:
  name: jk-db-secret
  namespace: jk-three-tier
type: Opaque
stringData:
  # Postgres superuser password used by the DB pod
  POSTGRES_PASSWORD: "change-me-strong-password"

  # Connection string used by the backend API (must match POSTGRES_PASSWORD above)
  DB_CONNECTION_STRING: "Host=postgres;Port=5432;Database=jk_configurations;Username=postgres;Password=change-me-strong-password;"

