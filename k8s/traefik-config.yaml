apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    ports:
      web:
        exposedPort: 8089
      postgres:           # Toto je název entryPointu
        port: 5432        # Port uvnitř Traefik podu
        exposedPort: 30432 # Port viditelný ve Windows
        protocol: TCP
