services:
  postgres:
    image: postgres:16
    container_name: jk-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: jk_configurations
    ports:
      - "5432:5432"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U postgres -d jk_configurations || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  db-init:
    image: postgres:16
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - ../database/init.sql:/init.sql
    command: >
      /bin/bash -c "
      psql -h postgres -U postgres -d jk_configurations -f /init.sql
      "
    restart: "no"

  backend:
    build:
      context: ../backend
    container_name: jk-backend
    environment:
      ConnectionStrings__DefaultConnection: "${DB_CONNECTION_STRING}"
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
    container_name: jk-frontend
    depends_on:
      - backend

  gateway:
    build:
      context: ../gateway
    container_name: jk-gateway
    ports:
      - "8082:80"
    depends_on:
      - frontend
      - backend
